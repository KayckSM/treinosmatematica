<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Treino de Matemática</title>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
margin-top:40px;
}

.cronometro-container{
position:fixed;
top:10px;
right:20px;
background:#f0f0f0;
padding:12px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.tempo{
font-size:22px;
font-weight:bold;
}

.atalho{
font-size:12px;
color:#555;
}

.abas button{
margin:5px;
padding:6px 12px;
}

.modos{
margin-top:15px;
}

.conta{
font-size:32px;
margin:20px 0;
}

input{
font-size:18px;
padding:5px;
width:140px;
text-align:center;
}

.mensagem{
margin-top:15px;
font-size:18px;
}
</style>
</head>

<body>

<div class="cronometro-container">
<div class="tempo" id="tempo">00:00:000</div>
<button onclick="iniciarCronometro()">Iniciar</button>
<button onclick="pausarCronometro()">Pausar</button>
<button onclick="continuarCronometro()">Voltar</button>
<button onclick="resetarCronometro()">Resetar</button>
<div class="atalho">Tecla "T" pausa/continua</div>
</div>

<h1>Treino de Matemática</h1>

<div class="abas">
<button onclick="trocarAba('basico')">Operações Básicas</button>
<button onclick="trocarAba('decimal')">Decimais</button>
</div>

<div id="basico" class="modos">
<label><input type="radio" name="modo" value="tabuadaSeq" checked> Tabuada Sequencial</label><br>
<label><input type="radio" name="modo" value="tabuadaRand"> Tabuada Aleatória</label><br>
<label><input type="radio" name="modo" value="soma"> Soma</label><br>
<label><input type="radio" name="modo" value="subtracao"> Subtração</label><br>
<label><input type="radio" name="modo" value="multiplicacao2d"> Multiplicação</label><br>
<label><input type="radio" name="modo" value="divisao"> Divisão</label><br>
</div>

<div id="decimal" class="modos" style="display:none">
<label><input type="radio" name="modo" value="somaDec"> Soma decimal</label><br>
<label><input type="radio" name="modo" value="subDec"> Subtração decimal</label><br>
<label><input type="radio" name="modo" value="multDec"> Multiplicação decimal</label><br>
<label><input type="radio" name="modo" value="divIntDec"> Inteiro ÷ decimal</label><br>
<label><input type="radio" name="modo" value="divDec"> Inteiro ÷ inteiro (decimal)</label><br>
</div>

<br>
<button onclick="iniciar()">Iniciar</button>

<div class="conta" id="conta"></div>

<input type="text" id="resposta" placeholder="Resposta">
<div class="mensagem" id="mensagem"></div>

<script>

/* CRONÔMETRO */

let inicio=0, tempo=0, rodando=false, intervalo=null

function atualizar(){
let m=Math.floor(tempo/60000)
let s=Math.floor((tempo%60000)/1000)
let ms=tempo%1000

document.getElementById("tempo").textContent=
`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms).padStart(3,'0')}`
}

function iniciarCronometro(){
if(!rodando){
inicio=Date.now()-tempo
intervalo=setInterval(()=>{
tempo=Date.now()-inicio
atualizar()
},10)
rodando=true
}
}

function pausarCronometro(){
clearInterval(intervalo)
rodando=false
}

function continuarCronometro(){
if(!rodando) iniciarCronometro()
}

function resetarCronometro(){
clearInterval(intervalo)
tempo=0
rodando=false
atualizar()
}

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="t"){
rodando?pausarCronometro():continuarCronometro()
}
})

/* SISTEMA */

let modo=""
let a,b,correto
const conta=document.getElementById("conta")
const msg=document.getElementById("mensagem")
const input=document.getElementById("resposta")

function trocarAba(aba){
document.getElementById("basico").style.display=aba==="basico"?"block":"none"
document.getElementById("decimal").style.display=aba==="decimal"?"block":"none"
}

function rand(max){return Math.floor(Math.random()*max)}

function randDec(maxInt, maxDec){
let inteiro=rand(maxInt)
let decimal=rand(maxDec+1)
return Number((inteiro + decimal/100).toFixed(2))
}

function iniciar(){
modo=document.querySelector('input[name="modo"]:checked').value
gerar()
}

function gerar(){

msg.textContent=""
input.value=""
input.focus()

switch(modo){

case "somaDec":
a=randDec(100,99)
b=randDec(100,99)
correto=Number((a+b).toFixed(2))
break

case "subDec":
a=randDec(100,99)
b=randDec(100,99)
if(b>a)[a,b]=[b,a]
correto=Number((a-b).toFixed(2))
break

case "multDec":
a=(rand(9)+1)+(rand(10)/10)
b=(rand(9)+1)+(rand(10)/10)
correto=Number((a*b).toFixed(2))
break

case "divIntDec":
b=(rand(9)+1)+(rand(10)/10)
let resultado=rand(9)+1
a=Number((b*resultado).toFixed(1))
correto=resultado
break

case "divDec":
b=rand(90)+1
let r=(rand(90)+1)/10
a=b*r
correto=Number(r.toFixed(1))
break

default:
a=rand(9)+1
b=rand(9)+1
correto=a*b
break

}

conta.textContent=`${a} ? ${b} = ?`

let opMap={
somaDec:"+",
subDec:"−",
multDec:"×",
divIntDec:"÷",
divDec:"÷"
}

conta.textContent=`${a} ${opMap[modo]||"×"} ${b} = ?`
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter") verificar()
})

function verificar(){

let resposta=parseFloat(input.value)

if(resposta===correto){
msg.textContent="✅ Correto!"
setTimeout(gerar,600)
}else{
msg.textContent="❌ Errado"
}

}

</script>

</body>
</html>
